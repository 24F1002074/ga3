name: DataDash QA Automation

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  scrape-and-sum:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      # This step name fulfills your exact assignment requirement
      - name: Run Playwright script for 24f1002074@ds.study.iitm.ac.in
        run: python scrape_and_sum.py
