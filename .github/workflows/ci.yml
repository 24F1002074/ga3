name: FastAPI CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Add any other requirements here (or use pip install -r requirements.txt)
        pip install fastapi[all] openai pytest
        
    - name: Run a successful check
      run: echo "Pipeline ran successfully! Ready for tests."
